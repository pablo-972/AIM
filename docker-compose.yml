services:
  aim:
    build:
      context: .
      dockerfile: dockerfile
    container_name: aim
    tty: true
    stdin_open: true
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
