
providers:
  ollama:
    type: ollama
    base_url:
      env: OLLAMA_BASE_URL
      default: http://localhost:11434
    supports_model_discovery: true

  openai:
    type: openai
    api_key:
      env: OPENAI_API_KEY
    base_url:
      env: OPENAI_BASE_URL
      default: https://api.openai.com/v1

  gemini:
    type: gemini
    api_key:
      env: GEMINI_API_KEY
    base_url:
      env: GEMINI_BASE_URL
      default: https://generativelanguage.googleapis.com/v1beta/openai

profiles:
  local-static:
    provider: ollama
    model: gemma4:e2b
    temperature: 0.1
    max_tokens: 4096
    response_format: json

  local-enrichment:
    provider: ollama
    model: llama3.1:8b
    temperature: 0.2
    max_tokens: 4096
    response_format: text

  local-reverse:
    provider: ollama
    model: gemma4:e2b
    temperature: 0.1
    max_tokens: 4096
    response_format: json

  local-report:
    provider: ollama
    model: llama3.1:8b
    temperature: 0.2
    max_tokens: 4096
    response_format: text

  openai-static:
    provider: openai
    model:
      env: OPENAI_STATIC_MODEL
      default: ""
    temperature: 0.1
    max_tokens: 4096

  openai-enrichment:
    provider: openai
    model:
      env: OPENAI_ENRICHMENT_MODEL
      default: ""
    temperature: 0.3
    max_tokens: 12000

  openai-reverse:
    provider: openai
    model:
      env: OPENAI_REVERSING_MODEL
      default: ""
    temperature: 0.1
    max_tokens: 4096
    response_format: json

  openai-report:
    provider: openai
    model:
      env: OPENAI_REPORT_MODEL
      default: ""
    temperature: 0.3
    max_tokens: 12000

  gemini-static:
    provider: gemini
    model:
      env: GEMINI_STATIC_MODEL
      default: "gemini-2.5-flash"
    temperature: 0.1
    max_tokens: 12000

  gemini-enrichment:
    provider: gemini
    model:
      env: GEMINI_ENRICHMENT_MODEL
      default: "gemini-2.5-flash"
    temperature: 0.1
    max_tokens: 12000

  gemini-reverse:
    provider: gemini
    model:
      env: GEMINI_REVERSING_MODEL
      default: "gemini-2.5-flash"
    temperature: 0.1
    max_tokens: 4096
    response_format: json

  gemini-report:
    provider: gemini
    model:
      env: GEMINI_REPORT_MODEL
      default: "gemini-2.5-flash"
    temperature: 0.1
    max_tokens: 12000

agents:
  static:
    default_profile: local-static
  reversing:
    default_profile: local-reverse

tasks:
  report:
    default_profile: local-report
  enrichment:
    default_profile: local-enrichment


